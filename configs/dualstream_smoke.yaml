model: dualstream
data_path: data/processed/smoke_pristine.pkl
output_dir: results/dualstream_smoke
seed: 0
batch_size: 4
epochs: 1
train_ratio: 0.7
val_ratio: 0.15
loss: mse
grad_clip: 5.0
optimizer:
  lr: 1.0e-3
  weight_decay: 1.0e-5
invariance_lambda: 0.05
model_kwargs:
  atom_fea_len: 9
  hidden_dim: 32
  n_local_layers: 1
  n_global_layers: 1
  num_heads: 4
  n_cross_layers: 1
  rcut_local: 5.0
  dmax_global: 12.0
  defect_embedding: true
  dropout: 0.0
  use_pfa: true
  k_max: 2
