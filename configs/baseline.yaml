model: baseline
data_path: data/processed/cleaned_dataset.pkl
output_dir: results/baseline
seed: 42
batch_size: 32
epochs: 35
train_ratio: 0.8
val_ratio: 0.1
loss: huber
huber_delta: 1.0
grad_clip: 1.0
optimizer:
  lr: 1.0e-3
  weight_decay: 1.0e-4
scheduler:
  factor: 0.5
  patience: 4
model_kwargs:
  atom_fea_len: 9
  hidden_dim: 128
  n_local_layers: 3
  n_global_layers: 2
  num_heads: 4
  n_rbf_edge: 32
  n_rbf_dist: 32
  rcut_local: 5.0
  dmax_global: 12.0
  defect_embedding: true
  dropout: 0.1
