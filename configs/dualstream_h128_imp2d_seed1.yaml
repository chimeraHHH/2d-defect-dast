model: dualstream
data_path: data/processed/cleaned_dataset_with_pristine.pkl
output_dir: results/dualstream_h128_imp2d_seed1
seed: 1
batch_size: 32
epochs: 60
train_ratio: 0.8
val_ratio: 0.1
loss: mse
grad_clip: 5.0
optimizer:
  lr: 3.0e-4
  weight_decay: 1.0e-4
scheduler:
  factor: 0.5
  patience: 6
invariance_lambda: 0.05
model_kwargs:
  atom_fea_len: 9
  hidden_dim: 128
  n_local_layers: 3
  n_global_layers: 2
  num_heads: 4
  n_cross_layers: 2
  rcut_local: 5.0
  dmax_global: 12.0
  defect_embedding: true
  dropout: 0.1
  use_pfa: true
  k_max: 2
  k_norm_sq_max: 4.0
