model: baseline
data_path: data/processed/dft_3d_lite.pkl
output_dir: results/pretrain_dft3d
seed: 42
batch_size: 64
epochs: 30
train_ratio: 0.8
val_ratio: 0.1
grad_clip: 5.0
optimizer:
  lr: 3.0e-4
  weight_decay: 1.0e-4
model_kwargs:
  atom_fea_len: 9
  hidden_dim: 128
  n_local_layers: 3
  n_global_layers: 2
  num_heads: 4
  rcut_local: 5.0
  dmax_global: 12.0
  defect_embedding: false
  dropout: 0.1
